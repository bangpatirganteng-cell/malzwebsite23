<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOMOKERS832</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b0b0b,#1a1a1a);
    color: white;
}

/* CONTAINER */
.container {
    padding: 15px;
    padding-bottom: 90px;
}

/* CARD */
.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 0 10px rgba(0,255,0,0.2);
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
}

/* BOTTOM NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    display: flex;
    justify-content: space-around;
    border-top: 2px solid red;
    padding: 10px 0;
}

.bottom-nav button {
    background: none;
    border: none;
    color: lime;
    font-size: 12px;
}

/* PROFILE */
.banner {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

.profile-pic {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-top: -40px;
    border: 3px solid black;
}

/* TITLE */
h1 {
    text-align: center;
    color: red;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    color: gray;
    margin-top: 20px;
}

/* RESPONSIVE */
@media (min-width: 768px) {
.container {
    max-width: 500px;
    margin: auto;
}
}
</style>
</head>

<body>

<div id="app"></div>

<!-- 🎵 MUSIK NO COPYRIGHT -->
<audio id="bgm" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9c0b.mp3?filename=gaming-music-ambient-110624.mp3" type="audio/mp3">
</audio>

<script>
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;

function save(){
localStorage.setItem("users", JSON.stringify(users));
}

/* NAV BAWAH */
function nav(){
return `
<div class="bottom-nav">
<button onclick="home()">Home</button>
<button onclick="info()">Info</button>
<button onclick="rules()">Rules</button>
<button onclick="profile()">Profile</button>
<button onclick="settings()">Settings</button>
</div>`;
}

/* LOGIN */
function loginPage(){
app.innerHTML = `
<div class="container">
<h1>JOMOKERS832</h1>
<div class="card">
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="registerPage()" style="color:lime;cursor:pointer;">Belum punya akun? Klik</p>
</div>
</div>`;
}

/* REGISTER */
function registerPage(){
app.innerHTML = `
<div class="container">
<div class="card">
<input id="ru" placeholder="Username">
<input id="rn" placeholder="Nama optional">
<input id="rp" type="password" placeholder="Password">
<button onclick="register()">Register</button>
</div>
</div>`;
}

function register(){
if(!ru.value || !rp.value) return alert("Isi dulu");
users.push({username:ru.value,name:rn.value,password:rp.value,about:"",banner:"",photo:""});
save();
alert("Berhasil");
loginPage();
}

function login(){
let user = users.find(x=>x.username==u.value && x.password==p.value);
if(!user) return alert("Salah");
currentUser = user;
home();
}

/* HOME */
function home(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>Welcome ${currentUser.username}</h2>
<p>Selamat datang di website JOMOKERS832</p>
</div>

<div class="card">
<h3>Update</h3>
<p>Website ini sudah support Android, PC, dan Laptop</p>
</div>

<div class="footer">JOMOKERS832 © 2026</div>
</div>
` + nav();
}

/* INFO */
function info(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>INFO</h2>
<p>Total Member: ${users.length}</p>
<button onclick="window.open('https://discord.gg/zafQ2ukDWb')">Join Discord</button>
</div>
</div>
` + nav();
}

/* RULES */
function rules(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>RULES</h2>
<p>
- Hormati semua member<br>
- Dilarang toxic<br>
- Dilarang spam<br>
- Ikuti admin<br>
- Jaga komunitas tetap aman<br>
- Gunakan bahasa sopan<br>
- Tidak boleh share ilegal<br>
- Pelanggaran akan diberi sanksi
</p>
</div>
</div>
` + nav();
}

/* PROFILE */
function profile(){
app.innerHTML = `
<div class="container">
<div class="card">
<img class="banner" src="${currentUser.banner}">
<input type="file" onchange="upBanner(event)">
<center><img class="profile-pic" src="${currentUser.photo}"></center>
<input type="file" onchange="upPhoto(event)">

<p>Username: ${currentUser.username}</p>
<p>Nama: ${currentUser.name}</p>

<textarea id="about">${currentUser.about}</textarea>
<button onclick="saveAbout()">Save</button>
</div>
</div>
` + nav();
}

function upBanner(e){
let r=new FileReader();
r.onload=()=>{currentUser.banner=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}

function upPhoto(e){
let r=new FileReader();
r.onload=()=>{currentUser.photo=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}

function saveAbout(){
currentUser.about = about.value;
save();
alert("Saved");
}

/* SETTINGS */
function settings(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>Settings</h2>
<button onclick="account()">Account</button>
<button onclick="alert('Fitur masih dikembangkan')">Search Member</button>
<button onclick="alert('Fitur masih dikembangkan')">Ganti Tema</button>
</div>
</div>
` + nav();
}

function account(){
app.innerHTML = `
<div class="container">
<div class="card">
<input id="nn" placeholder="Nama baru">
<input id="np" placeholder="Password baru">
<button onclick="saveAcc()">Save</button>
</div>
</div>
` + nav();
}

function saveAcc(){
if(nn.value) currentUser.name=nn.value;
if(np.value) currentUser.password=np.value;
save();
alert("Updated");
settings();
}

loginPage();
</script>

</body>
</html>
