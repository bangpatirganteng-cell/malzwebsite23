<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOMOKERS832</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:#111;
overflow-x:hidden;
}

/* BACKGROUND GERAK */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#222,#111,#333);
animation:moveBg 10s linear infinite;
z-index:-1;
}
@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-25%,-25%);}
}

/* CONTAINER */
.container{
padding:15px;
padding-bottom:90px;
max-width:500px;
margin:auto;
}

/* CARD */
.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 0 10px rgba(0,255,0,0.2);
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

textarea{
height:80px;
max-width:100%;
overflow:hidden;
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
border-radius:8px;
margin-top:5px;
}

/* NAV BAWAH */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:black;
display:flex;
justify-content:center;
gap:20px;
border-top:2px solid red;
}

.bottom-nav button{
background:none;
border:none;
color:lime;
font-size:13px;
}

/* PROFILE */
.banner-container{position:relative;}
.banner{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}
.upload-banner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
.profile-pic{
width:90px;
height:90px;
border-radius:50%;
margin-top:-20px;
border:3px solid black;
}
.upload-photo{
display:block;
margin:10px auto;
}

/* LOGO */
.logo{
display:block;
margin:auto;
width:100px;
}

/* DESKTOP CENTER */
@media(min-width:768px){
.bottom-nav{
justify-content:center;
}
}
</style>
</head>

<body>

<div id="app"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9c0b.mp3">
</audio>

<script>
let users = JSON.parse(localStorage.getItem("users")||"[]");
let currentUser = JSON.parse(localStorage.getItem("currentUser"))||null;
let theme = localStorage.getItem("theme")||"#111";

document.body.style.background = theme;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("currentUser",JSON.stringify(currentUser));
}

function nav(){
return `
<div class="bottom-nav">
<button onclick="home()">Home</button>
<button onclick="info()">Info</button>
<button onclick="rules()">Rules</button>
<button onclick="profile()">Profile</button>
<button onclick="settings()">Settings</button>
</div>`;
}

/* LOGIN */
function loginPage(){
app.innerHTML=`
<div class="container">
<img class="logo" src="https://i.imgur.com/8Km9tLL.png">
<div class="card">
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="playMusic()">Play Music</button>
<p onclick="registerPage()" style="color:lime;">Register</p>
</div>
</div>`;
}

function playMusic(){
document.getElementById("bgm").play();
}

/* REGISTER */
function registerPage(){
app.innerHTML=`
<div class="container">
<div class="card">
<input id="ru" placeholder="Username">
<input id="rn" placeholder="Nama">
<input id="rp" type="password">
<button onclick="register()">Register</button>
</div>
</div>`;
}

function register(){
users.push({username:ru.value,name:rn.value,password:rp.value,about:"",banner:"",photo:""});
save();
loginPage();
}

function login(){
let user=users.find(x=>x.username==u.value && x.password==p.value);
if(!user)return alert("Salah");
currentUser=user;
save();
home();
}

/* AUTO LOGIN */
if(currentUser){home();}else{loginPage();}

/* HOME */
function home(){
app.innerHTML=`
<div class="container">
<div class="card">
<h2>Welcome ${currentUser.username}</h2>
</div>
</div>`+nav();
}

/* INFO */
function info(){
app.innerHTML=`
<div class="container">
<div class="card">
<p>Total Member: ${users.length}</p>
<button onclick="window.open('https://discord.gg/zafQ2ukDWb')">Discord</button>
</div>
</div>`+nav();
}

/* RULES */
function rules(){
app.innerHTML=`
<div class="container">
<div class="card">
<p>- No toxic<br>- No spam<br>- Hormati member</p>
</div>
</div>`+nav();
}

/* PROFILE */
function profile(){
app.innerHTML=`
<div class="container">
<div class="card">

<div class="banner-container">
<img class="banner" src="${currentUser.banner}">
<input class="upload-banner" type="file" onchange="upBanner(event)">
</div>

<center>
<img class="profile-pic" src="${currentUser.photo}">
<input class="upload-photo" type="file" onchange="upPhoto(event)">
</center>

<p>${currentUser.username}</p>
<p>${currentUser.name}</p>

<textarea id="about">${currentUser.about}</textarea>
<button onclick="saveAbout()">Save</button>

</div>
</div>`+nav();
}

function upBanner(e){
let r=new FileReader();
r.onload=()=>{currentUser.banner=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}
function upPhoto(e){
let r=new FileReader();
r.onload=()=>{currentUser.photo=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}
function saveAbout(){
currentUser.about=about.value;
save();
}

/* SETTINGS */
function settings(){
app.innerHTML=`
<div class="container">
<div class="card">
<button onclick="account()">Account</button>
<button onclick="searchMember()">Search Member</button>
<button onclick="changeTheme()">Ganti Tema</button>
<button onclick="logout()">Logout</button>
</div>
</div>`+nav();
}

function account(){
alert("Edit via profile ya");
}

/* SEARCH */
function searchMember(){
let name=prompt("Cari username:");
let user=users.find(x=>x.username==name);
alert(user? "Ditemukan: "+user.username : "Tidak ada");
}

/* THEME */
function changeTheme(){
let color=prompt("Masukkan warna: hitam / abu / putih / biru");

if(color=="hitam")theme="#111";
if(color=="abu")theme="#555";
if(color=="putih")theme="#ddd";
if(color=="biru")theme="#0b3d91";

localStorage.setItem("theme",theme);
document.body.style.background=theme;
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}
</script>

</body>
</html>
