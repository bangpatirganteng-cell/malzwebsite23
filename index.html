<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOMOKERS832</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b0b0b,#1a1a1a);
    color: white;
}

.container {
    padding: 15px;
    padding-bottom: 90px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 0 10px rgba(0,255,0,0.2);
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

textarea {
    height: 80px;
    resize: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
}

/* NAV BAWAH */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    display: flex;
    justify-content: space-around;
    border-top: 2px solid red;
}

.bottom-nav button {
    background: none;
    border: none;
    color: lime;
    font-size: 12px;
}

/* BANNER */
.banner-container {
    position: relative;
}

.banner {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

.upload-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PROFILE */
.profile-pic {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-top: -20px;
    border: 3px solid black;
}

.upload-photo {
    display: block;
    margin: 10px auto;
}

/* RESPONSIVE */
@media (min-width: 768px) {
.container {
    max-width: 500px;
    margin: auto;
}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

function save(){
localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));
}

/* NAV */
function nav(){
return `
<div class="bottom-nav">
<button onclick="home()">Home</button>
<button onclick="info()">Info</button>
<button onclick="rules()">Rules</button>
<button onclick="profile()">Profile</button>
<button onclick="settings()">Settings</button>
</div>`;
}

/* LOGIN */
function loginPage(){
app.innerHTML = `
<div class="container">
<h1 style="color:red;text-align:center;">JOMOKERS832</h1>
<div class="card">
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="registerPage()" style="color:lime;cursor:pointer;">Belum punya akun?</p>
</div>
</div>`;
}

/* REGISTER */
function registerPage(){
app.innerHTML = `
<div class="container">
<div class="card">
<input id="ru" placeholder="Username">
<input id="rn" placeholder="Nama optional">
<input id="rp" type="password" placeholder="Password">
<button onclick="register()">Register</button>
</div>
</div>`;
}

function register(){
if(!ru.value || !rp.value) return alert("Isi dulu");
users.push({username:ru.value,name:rn.value,password:rp.value,about:"",banner:"",photo:""});
save();
alert("Berhasil");
loginPage();
}

function login(){
let user = users.find(x=>x.username==u.value && x.password==p.value);
if(!user) return alert("Salah");
currentUser = user;
save();
home();
}

/* AUTO LOGIN */
if(currentUser){
setTimeout(home,100);
}else{
setTimeout(loginPage,100);
}

/* HOME */
function home(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>Welcome ${currentUser.username}</h2>
<p>Selamat datang di JOMOKERS832</p>
</div>
</div>` + nav();
}

/* INFO */
function info(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>INFO</h2>
<p>Total Member: ${users.length}</p>
<button onclick="window.open('https://discord.gg/zafQ2ukDWb')">Join Discord</button>
</div>
</div>` + nav();
}

/* RULES */
function rules(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>RULES</h2>
<p>
- Hormati member<br>
- No toxic<br>
- No spam<br>
- Ikuti admin<br>
- Jaga komunitas
</p>
</div>
</div>` + nav();
}

/* PROFILE */
function profile(){
app.innerHTML = `
<div class="container">
<div class="card">

<div class="banner-container">
<img class="banner" src="${currentUser.banner}">
<input class="upload-banner" type="file" onchange="upBanner(event)">
</div>

<center>
<img class="profile-pic" src="${currentUser.photo}">
<input class="upload-photo" type="file" onchange="upPhoto(event)">
</center>

<p>Username: ${currentUser.username}</p>
<p>Nama: ${currentUser.name}</p>

<textarea id="about">${currentUser.about}</textarea>
<button onclick="saveAbout()">Save</button>

</div>
</div>` + nav();
}

function upBanner(e){
let r=new FileReader();
r.onload=()=>{currentUser.banner=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}

function upPhoto(e){
let r=new FileReader();
r.onload=()=>{currentUser.photo=r.result;save();profile();}
r.readAsDataURL(e.target.files[0]);
}

function saveAbout(){
currentUser.about = about.value;
save();
alert("Saved");
}

/* SETTINGS */
function settings(){
app.innerHTML = `
<div class="container">
<div class="card">
<h2>Settings</h2>
<button onclick="logout()">Logout</button>
</div>
</div>` + nav();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
currentUser = null;
loginPage();
}
</script>

</body>
</html>
