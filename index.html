<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOMOKERS832</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* NAVBAR */
.navbar {
    background: black;
    padding: 10px;
    display: flex;
    justify-content: space-around;
    border-bottom: 2px solid red;
}

.navbar button {
    background: none;
    border: none;
    color: lime;
    font-weight: bold;
    cursor: pointer;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

/* BUTTON */
button.main {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
}

/* PROFILE */
.banner {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: gray;
}

.profile-pic {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-top: -40px;
    border: 3px solid black;
}

/* TITLE */
h1 {
    text-align: center;
    color: red;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;

function save() {
    localStorage.setItem("users", JSON.stringify(users));
}

/* LOGIN */
function showLogin() {
document.getElementById("app").innerHTML = `
<div class="container">
<h1>JOMOKERS832</h1>
<h2>Login</h2>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button class="main" onclick="login()">Login</button>
<p onclick="showRegister()" style="color:lime;cursor:pointer;">Belum punya akun? Klik sini</p>
</div>`;
}

/* REGISTER */
function showRegister() {
document.getElementById("app").innerHTML = `
<div class="container">
<h1>Register</h1>
<input id="ruser" placeholder="Username">
<input id="rname" placeholder="Nama optional">
<input id="rpass" type="password" placeholder="Password">
<button class="main" onclick="register()">Register</button>
</div>`;
}

function register() {
let u = ruser.value;
let n = rname.value;
let p = rpass.value;

if(!u || !p) return alert("Isi dulu semua");

users.push({username:u,name:n,password:p,about:"",banner:"",photo:""});
save();
alert("Berhasil!");
showLogin();
}

function login() {
let u = luser.value;
let p = lpass.value;

let user = users.find(x => x.username==u && x.password==p);
if(!user) return alert("Salah");

currentUser = user;
showHome();
}

/* NAV */
function navbar() {
return `
<div class="navbar">
<button onclick="showHome()">Home</button>
<button onclick="showInfo()">Info</button>
<button onclick="showRules()">Rules</button>
<button onclick="showProfile()">Profile</button>
<button onclick="showSettings()">Settings</button>
</div>`;
}

/* HOME */
function showHome() {
app.innerHTML = navbar() + `
<div class="container">
<h2>Welcome ${currentUser.username}</h2>
<p>Selamat datang di JOMOKERS832 website.</p>
</div>`;
}

/* INFO */
function showInfo() {
app.innerHTML = navbar() + `
<div class="container">
<h2>INFO</h2>
<p>Total Member: ${users.length}</p>
<button class="main" onclick="window.open('https://discord.gg/zafQ2ukDWb')">Join Discord</button>
</div>`;
}

/* RULES */
function showRules() {
app.innerHTML = navbar() + `
<div class="container">
<h2>RULES</h2>
<p>
- Hormati member<br>
- No toxic<br>
- No spam<br>
- Ikuti admin<br>
- Jaga komunitas<br>
</p>
</div>`;
}

/* PROFILE */
function showProfile() {
app.innerHTML = navbar() + `
<div class="container">
<img class="banner" src="${currentUser.banner}">
<input type="file" onchange="uploadBanner(event)">

<center>
<img class="profile-pic" src="${currentUser.photo}">
</center>
<input type="file" onchange="uploadPhoto(event)">

<p>Username: ${currentUser.username}</p>
<p>Nama: ${currentUser.name}</p>

<textarea id="about">${currentUser.about}</textarea>
<button class="main" onclick="saveAbout()">Save About</button>
</div>`;
}

function uploadBanner(e) {
let r = new FileReader();
r.onload = () => { currentUser.banner = r.result; save(); showProfile(); };
r.readAsDataURL(e.target.files[0]);
}

function uploadPhoto(e) {
let r = new FileReader();
r.onload = () => { currentUser.photo = r.result; save(); showProfile(); };
r.readAsDataURL(e.target.files[0]);
}

function saveAbout() {
currentUser.about = about.value;
save();
alert("Saved");
}

/* SETTINGS */
function showSettings() {
app.innerHTML = navbar() + `
<div class="container">
<h2>Settings</h2>
<button class="main" onclick="showAccount()">Account</button>
<button class="main" onclick="alert('Fitur masih dikembangkan')">Search Member</button>
<button class="main" onclick="alert('Fitur masih dikembangkan')">Ganti Tema</button>
</div>`;
}

function showAccount() {
app.innerHTML = navbar() + `
<div class="container">
<h2>Account</h2>
<input id="newName" placeholder="Nama baru">
<input id="newPass" placeholder="Password baru">
<button class="main" onclick="updateAcc()">Save</button>
</div>`;
}

function updateAcc() {
if(newName.value) currentUser.name = newName.value;
if(newPass.value) currentUser.password = newPass.value;
save();
alert("Updated");
showSettings();
}

showLogin();
</script>

</body>
</html>
